<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fitness Challenge Admin</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- Auth Screen -->
  <div id="auth-screen" class="screen">
    <div class="auth-card">
      <div class="auth-icon">⚡</div>
      <h1>Fitness Challenge Admin</h1>
      <p class="auth-subtitle">Sign in to manage challenge data</p>
      <button id="sign-in-btn" class="btn btn-primary btn-large">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" style="vertical-align:middle;margin-right:8px">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        Sign in with Google
      </button>
      <div id="auth-error" class="error-msg hidden"></div>
    </div>
  </div>

  <!-- Main App Screen -->
  <div id="app-screen" class="screen hidden">
    <header class="app-header">
      <h1>⚡ Fitness Challenge Admin</h1>
      <div class="header-actions">
        <button id="add-btn" class="btn btn-primary">+ Add Challenge</button>
        <button id="sign-out-btn" class="btn btn-ghost">Sign Out</button>
      </div>
    </header>

    <main class="main-content">
      <!-- Filter Tabs -->
      <div class="filter-tabs" id="filter-tabs">
        <button class="filter-tab active" data-filter="all">All</button>
        <button class="filter-tab" data-filter="7day">7 Day</button>
        <button class="filter-tab" data-filter="30day">30 Day</button>
      </div>

      <div id="item-list" class="item-grid">
        <div class="loading-placeholder">Loading challenges…</div>
      </div>
    </main>
  </div>

  <!-- Modal Form -->
  <div id="modal-overlay" class="modal-overlay hidden">
    <div class="modal">
      <div class="modal-header">
        <h2 id="modal-title">New Challenge</h2>
        <button id="modal-close-btn" class="btn-icon" aria-label="Close">✕</button>
      </div>
      <form id="item-form" class="item-form">
        <input type="hidden" id="form-doc-id" />
        <div class="form-grid">
          <div class="form-group">
            <label for="form-challenge-type">Challenge Type *</label>
            <select id="form-challenge-type" required>
              <option value="">— select —</option>
              <option value="7day">7 Day</option>
              <option value="30day">30 Day</option>
            </select>
          </div>
          <div class="form-group">
            <label for="form-day-number">Day Number *</label>
            <input type="number" id="form-day-number" placeholder="1–30" min="1" max="30" required />
          </div>
          <div class="form-group span-2">
            <label for="form-title">Title *</label>
            <input type="text" id="form-title" placeholder="Challenge title" required />
          </div>
          <div class="form-group">
            <label for="form-difficulty">Difficulty</label>
            <select id="form-difficulty">
              <option value="">— select —</option>
              <option value="Beginner">Beginner</option>
              <option value="Intermediate">Intermediate</option>
              <option value="Advanced">Advanced</option>
            </select>
          </div>
          <div class="form-group">
            <label for="form-duration">Duration (minutes)</label>
            <input type="number" id="form-duration" placeholder="0" min="0" step="1" />
          </div>
          <div class="form-group">
            <label for="form-calories">Calories Burn (est.)</label>
            <input type="number" id="form-calories" placeholder="0" min="0" step="1" />
          </div>
          <div class="form-group">
            <!-- spacer -->
          </div>

          <!-- Workout Section -->
          <div class="form-section-heading span-2">Workout</div>
          <div class="form-group span-2">
            <label for="form-workout-title">Workout Title</label>
            <input type="text" id="form-workout-title" placeholder="e.g. Full Body HIIT Circuit" />
          </div>
          <div class="form-group span-2">
            <label for="form-workout-description">Workout Description</label>
            <textarea id="form-workout-description" rows="3" placeholder="Describe the workout…"></textarea>
          </div>

          <!-- Exercises -->
          <div class="form-section-heading span-2">
            Exercises
            <button type="button" id="add-exercise-btn" class="btn btn-sm btn-accent">+ Add Exercise</button>
          </div>
          <div class="form-group span-2" id="exercises-container">
            <!-- Exercise rows injected here -->
          </div>

          <!-- Other -->
          <div class="form-section-heading span-2">Extras</div>
          <div class="form-group span-2">
            <label for="form-nutrition-tip">Nutrition Tip</label>
            <textarea id="form-nutrition-tip" rows="2" placeholder="e.g. Focus on protein intake today…"></textarea>
          </div>
          <div class="form-group span-2">
            <label for="form-habit-goal">Habit Goal</label>
            <input type="text" id="form-habit-goal" placeholder="e.g. Drink 8 glasses of water" />
          </div>
          <div class="form-group span-2">
            <label for="form-motivational-quote">Motivational Quote</label>
            <input type="text" id="form-motivational-quote" placeholder="e.g. Push yourself…" />
          </div>
        </div>
        <div id="form-error" class="error-msg hidden"></div>
        <div class="form-actions">
          <button type="button" id="form-cancel-btn" class="btn btn-ghost">Cancel</button>
          <button type="submit" class="btn btn-primary">Save Challenge</button>
        </div>
      </form>
    </div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
